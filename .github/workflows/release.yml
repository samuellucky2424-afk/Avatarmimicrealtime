name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build native virtual camera
        working-directory: native-camera
        shell: pwsh
        run: .\build.ps1

      - name: Prepare public desktop configuration
        working-directory: app
        shell: pwsh
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_URL)) {
            $env:VITE_SUPABASE_URL = "https://nvhhimehfryzxecxbcyr.supabase.co"
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_ANON_KEY)) {
            $env:VITE_SUPABASE_ANON_KEY = (Select-String -Path "src/lib/supabase.ts" -Pattern "DEPLOYED_SUPABASE_ANON_KEY = '([^']+)'" | ForEach-Object { $_.Matches[0].Groups[1].Value })
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_API_URL)) {
            $env:VITE_API_URL = "https://avatarmimicrealtime.vercel.app"
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_ANON_KEY)) {
            throw "Missing VITE_SUPABASE_ANON_KEY"
          }
          @(
            "VITE_SUPABASE_URL=$env:VITE_SUPABASE_URL"
            "VITE_SUPABASE_ANON_KEY=$env:VITE_SUPABASE_ANON_KEY"
            "VITE_API_URL=$env:VITE_API_URL"
          ) | Set-Content -Path .env -Encoding ascii

      - name: Build Electron release
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build

      - name: Resolve release version
        id: release-version
        working-directory: app
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ("${{ github.ref_type }}" -eq "tag") {
            $tagName = "${{ github.ref_name }}"
            $tagVersion = $tagName.TrimStart('v')
            if ($tagVersion -ne $packageVersion) {
              throw "Tag $tagName does not match app/package.json version $packageVersion"
            }
            $version = $tagVersion
          } else {
            $version = $packageVersion
            $tagName = "v$packageVersion"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.release-version.outputs.VERSION }}"
          $dir = "app/release-avatar-mimic"
          $installer = Join-Path $dir "Avatar Mimic Real Time Setup $version.exe"
          $portable = Join-Path $dir "Avatar Mimic Real Time $version.exe"
          if (!(Test-Path $installer)) { throw "Missing installer: $installer" }
          if (!(Test-Path $portable)) { throw "Missing portable build: $portable" }
          if (!(Test-Path "$installer.blockmap")) { throw "Missing installer blockmap" }
          if (!(Test-Path (Join-Path $dir "latest.yml"))) { throw "Missing latest.yml" }

          $cameraDir = Join-Path $dir "win-unpacked/resources/surevideotool-cam"
          $requiredCameraFiles = @(
            "SurevideotoolVirtualCamera.dll",
            "SurevideotoolVirtualCameraMF.dll",
            "surevideotool_cam_pipe_publisher.exe",
            "surevideotool_cam_registrar.exe"
          )
          foreach ($file in $requiredCameraFiles) {
            if (!(Test-Path (Join-Path $cameraDir $file))) { throw "Missing virtual camera artifact: $file" }
          }

          $bundledEnv = Join-Path $dir "win-unpacked/resources/.env"
          if (Test-Path $bundledEnv) { throw "Desktop release must not bundle .env" }

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-version.outputs.TAG_NAME }}
          name: Avatar Mimic Real Time ${{ steps.release-version.outputs.VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            app/release-avatar-mimic/*.exe
            app/release-avatar-mimic/*.blockmap
            app/release-avatar-mimic/latest*.yml
